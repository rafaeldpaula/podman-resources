services:
  rabbitmq-local:
    image: docker.io/library/rabbitmq:4-management
    container_name: rabbitmq-local
    hostname: rabbit-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_ERLANG_COOKIE: cookie_secreto_compartilhado
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - rabbit-net

  rabbitmq-moby-local:
    image: docker.io/library/rabbitmq:4-management
    container_name: rabbitmq-moby-local
    hostname: rabbit-local-moby
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
      RABBITMQ_ERLANG_COOKIE: cookie_secreto_compartilhado
    networks:
      - rabbit-net

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - elastic-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.19.0
    container_name: kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - elastic-net

  apm-server:
    image: docker.elastic.co/apm/apm-server:8.19.0
    container_name: apm-server
    ports:
      - "8200:8200"
    command: >
      apm-server -e
      -E output.elasticsearch.hosts=["http://elasticsearch:9200"]
      -E apm-server.host="0.0.0.0:8200"
    depends_on:
      - elasticsearch
    networks:
      - elastic-net

volumes:
  rabbitmq_data:
  redis_data:
  elasticsearch_data:

networks:
  rabbit-net:
    driver: bridge
    driver_opts:
      mtu: "1500"

  elastic-net:
    driver: bridge